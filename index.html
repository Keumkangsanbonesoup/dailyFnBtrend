<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 F&B 트렌드</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="logo sub-copy">3일간 숙성한 따끈한 트렌드만 모았어요</div>
            <div class="food-icons">
                <span class="food-icon">🥐</span>
                <span class="food-icon">🍔</span>
                <span class="food-icon">🍰</span>
            </div>
            <h1 class="main-title">오늘의 트렌드</h1>
            <p id="summary-text">AI가 분석한 오늘의 핵심 식음료 트렌드를 불러오는 중입니다...</p>
            <div class="meta-info">
                <span class="badge">Last Updated: <span id="update-date">...</span></span>
            </div>
        </header>

        <main id="trends-grid" class="trends-grid">
            <!-- 자바스크립트를 통해 카드들이 여기에 렌더링됩니다 -->
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
